services:
  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:${DB_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data:/var/lib/postgresql/raw_data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      postgres:
        condition: service_healthy

  mage:
    image: mageai/mageai:latest
    container_name: mage
    restart: unless-stopped
    environment:
      USER_CODE_PATH: /home/src/${MAGE_PROJECT_NAME}
      MAGE_DATABASE_CONNECTION_URL: postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@postgres:${DB_PORT}/${DB_NAME}
      MAGE_ADMIN_EMAIL: ${MAGE_ADMIN_EMAIL}
      MAGE_ADMIN_PASSWORD: ${MAGE_ADMIN_PASSWORD}
      MAGE_ADMIN_USERNAME: ${MAGE_ADMIN_USERNAME}
    ports:
      - "${MAGE_PORT}:6789"
    volumes:
      - .:/home/src
    command: mage start ${MAGE_PROJECT_NAME}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
