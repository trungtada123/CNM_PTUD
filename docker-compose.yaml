services:
  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data:/var/lib/postgresql/raw_data
      - ./data/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      postgres:
        condition: service_healthy

  mage:
    build: ./mage
    container_name: mage
    restart: unless-stopped
    env_file:
      - .env
    environment:
      USER_CODE_PATH: /home/src/${MAGE_PROJECT_NAME}
      MAGE_DATABASE_CONNECTION_URL: postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}
      MAGE_ADMIN_EMAIL: ${MAGE_ADMIN_EMAIL}
      MAGE_ADMIN_PASSWORD: ${MAGE_ADMIN_PASSWORD}
      MAGE_ADMIN_USERNAME: ${MAGE_ADMIN_USERNAME}
    ports:
      - "${MAGE_PORT}:6789"
    volumes:
      - ./mage:/home/src

    command: mage start ${MAGE_PROJECT_NAME}
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000" # API 
      - "${MINIO_CONSOLE_PORT}:9001" # Web Console
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  minio-init:
    image: minio/mc
    container_name: minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio ${MINIO_ENDPOINT_URL} ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb -p myminio/${MINIO_MODELS_BUCKET_NAME} || true;
      mc mb -p myminio/${MINIO_FEATURES_BUCKET_NAME} || true;
      exit 0;
      "

  mlflow:
    image: python:3.10-slim
    container_name: mlflow
    restart: unless-stopped
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    environment:
      # MinIO (như AWS S3)
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      MLFLOW_S3_ENDPOINT_URL: ${MINIO_ENDPOINT_URL}
      MLFLOW_S3_IGNORE_TLS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    # MLflow cần thư viện psycopg2 để kết nối Postgres và boto3 để kết nối MinIO
    command: >
      bash -c "pip install mlflow psycopg2-binary boto3 && 
      mlflow server 
      --host 0.0.0.0 
      --port 5000 
      --backend-store-uri ${MLFLOW_BACKEND_STORE_URI} 
      --default-artifact-root s3://${MINIO_MODELS_BUCKET_NAME}"


volumes:
  postgres_data:
  redis_data:
  minio_data:
