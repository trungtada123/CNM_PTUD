services:
  postgres:
    image: postgres:15
    container_name: kkbox-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kkbox}
      POSTGRES_USER: ${POSTGRES_USER:-kkbox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kkbox}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kkbox} -d ${POSTGRES_DB:-kkbox}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: kkbox-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-02-07T23-21-09Z
    container_name: kkbox-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  createbuckets:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/${MLFLOW_ARTIFACT_BUCKET:-mlflow};
      mc anonymous set download local/${MLFLOW_ARTIFACT_BUCKET:-mlflow};
      exit 0;
      "

  mlflow:
    build: .
    container_name: kkbox-mlflow
    depends_on:
      postgres:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    command: >
      mlflow server
      --backend-store-uri postgresql+psycopg2://${POSTGRES_USER:-kkbox}:${POSTGRES_PASSWORD:-kkbox}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-kkbox}
      --default-artifact-root s3://${MLFLOW_ARTIFACT_BUCKET:-mlflow}
      --host 0.0.0.0
      --port 5000
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MLFLOW_S3_ENDPOINT_URL: ${MINIO_ENDPOINT:-http://minio:9000}
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - ../data_2percent:/data

  mage:
    build:
      context: .
      dockerfile: Dockerfile.mage
    container_name: kkbox-mage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_started
    command: mage start mage_project --host 0.0.0.0 --port 6789
    env_file:
      - .env
    ports:
      - "6789:6789"
    volumes:
      - .:/app
      - ../data_2percent:/data

  runner:
    build: .
    container_name: kkbox-runner
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_started
    env_file:
      - .env
    command: sleep infinity
    volumes:
      - .:/app
      - ../data_2percent:/data

  bentoml:
    build: .
    container_name: kkbox-bentoml
    depends_on:
      redis:
        condition: service_healthy
      mlflow:
        condition: service_started
    env_file:
      - .env
    command: bentoml serve bentoml_service.service:svc --host 0.0.0.0 --port 3000
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - ../data_2percent:/data

  dashboard:
    build: .
    container_name: kkbox-dashboard
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
    env_file:
      - .env
    command: uvicorn dashboard_app.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ../data_2percent:/data

volumes:
  postgres_data:
  minio_data:
